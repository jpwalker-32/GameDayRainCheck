<script>
"use strict";
var REGIONS={OK:[{id:"all",label:"All Regions"},{id:"ne-ok",label:"Northeastern OK"},{id:"c-ok",label:"Central OK"},{id:"se-ok",label:"Southeastern OK"},{id:"w-ok",label:"Western OK"}],AR:[{id:"all",label:"All Regions"},{id:"nw-ar",label:"NW Arkansas"},{id:"fs-ar",label:"Fort Smith"},{id:"c-ar",label:"Central AR"}],TX:[{id:"all",label:"All Regions"},{id:"dfw-tx",label:"DFW"}],KS:[{id:"all",label:"All Regions"},{id:"s-ks",label:"South KS"}],MO:[{id:"all",label:"All Regions"},{id:"sw-mo",label:"SW Missouri"}]};
var TYPES=[{id:"all",label:"All Types",cls:""},{id:"hs",label:"High School",cls:"type-hs"},{id:"col",label:"College / Univ.",cls:"type-col"},{id:"yr",label:"Youth / Recreation",cls:"type-yr"}];
var TYPE_LABELS={hs:"High School",col:"College",yr:"Youth / Rec"};
var TYPE_CLS={hs:"ft-hs",col:"ft-col",yr:"ft-yr"};

var FIELDS=[];
var SHEET_CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRZxDFJM55pQ6yC2dp1qyhv9Vtn4ds53hU_SrsgA9IisqVurStvlA3OhxuNn9wFDw/pub?gid=915517523&single=true&output=csv';

function parseCSV(text){
  var lines=text.trim().split('\n');
  var result=[];
  var typeMap={'youth':'yr','youth / recreation':'yr','youth / rec':'yr',
               'high school':'hs','hs':'hs','col':'col','college':'col',
               'college / univ.':'col','university':'col','yr':'yr'};
  for(var i=1;i<lines.length;i++){
    var cols=splitCSVLine(lines[i]);
    if(cols.length<8)continue;
    var active=cols.length>=11?(cols[10]||'Y').trim().toUpperCase():'Y';
    if(active==='N')continue;
    var id=parseInt(cols[0],10);
    var lat=parseFloat(cols[6]);
    var lon=parseFloat(cols[7]);
    if(!id||isNaN(lat)||isNaN(lon))continue;
    var rawType=(cols[3]||'').trim().toLowerCase();
    var ftype=typeMap[rawType]||rawType;
    result.push({
      id:id, state:(cols[1]||'').trim(), region:(cols[2]||'').trim(),
      type:ftype, name:(cols[4]||'').trim(), city:(cols[5]||'').trim(),
      lat:lat, lon:lon,
      surface:cols.length>=9?(cols[8]||'').trim():'',
      notes:cols.length>=10?(cols[9]||'').trim():'',
    });
  }
  return result;
}

function splitCSVLine(line){
  var cols=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){cols.push(cur);cur='';}
    else{cur+=c;}
  }
  cols.push(cur);
  return cols;
}

async function loadParks(){
  var grid=document.getElementById('field-grid');

  var baseURL = SHEET_CSV_URL;
  var proxies = [
    baseURL,
    'https://corsproxy.io/?' + baseURL,
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(baseURL),
  ];

  var text = null;
  var lastErr = null;
  for(var p=0; p<proxies.length; p++){
    try{
      var res = await fetch(proxies[p], {cache:'no-store'});
      if(!res.ok) throw new Error('HTTP ' + res.status);
      text = await res.text();
      if(text && text.length > 10) break;
    }catch(e){
      lastErr = e;
      console.warn('Fetch attempt '+(p+1)+' failed:', e.message);
    }
  }

  if(!text){
    console.error('All fetch attempts failed:', lastErr);
    grid.innerHTML='<div style="grid-column:1/-1;padding:20px;text-align:center;font-family:\'DM Mono\',monospace;font-size:11px;color:#f87171;">&#9888; Could not load ballpark data.<br><span style=\"color:#4a6880;font-size:10px;\">This works on the live site. To test locally, open via a local server or push to GitHub Pages.</span><br><br><button type=\"button\" onclick=\"loadParks()\" style=\"margin-top:10px;padding:7px 16px;border-radius:8px;border:1px solid #2a3d50;background:#0d1017;color:#38bdf8;font-family:DM Mono,monospace;font-size:10px;cursor:pointer;\">&#8635; Retry</button></div>';
    return;
  }

  try{
    var parsed = parseCSV(text);
    if(parsed.length === 0) throw new Error('Spreadsheet returned 0 parks — check Active column and CSV publish settings.');
    FIELDS = parsed.map(function(f,i){f._idx=i;return f;});
    renderGrids();
  }catch(e){
    console.error('Park parse error:', e);
    grid.innerHTML='<div style="grid-column:1/-1;padding:20px;text-align:center;font-family:\'DM Mono\',monospace;font-size:11px;color:#f87171;">&#9888; ' + e.message + '</div>';
  }
}

var STATUSES={on:{label:"&#9918; Play Ball",sub:"Conditions look favorable",color:"#00c853",glow:"rgba(0,200,83,0.12)"},questionable:{label:"&#9888; Questionable",sub:"Monitor conditions closely",color:"#ffd600",glow:"rgba(255,214,0,0.12)"},cancelled:{label:"&#127783; Likely Cancelled",sub:"High chance of rain or delay",color:"#ff3d57",glow:"rgba(255,61,87,0.12)"}};
var SURFACE_CFG={standard:{duringMult:1.00,preMult:1.00,windMult:1.00},allDirt:{duringMult:1.20,preMult:1.45,windMult:0.85},infieldTurf:{duringMult:0.72,preMult:0.45,windMult:1.00},fullTurf:{duringMult:0.38,preMult:0.10,windMult:1.00}};
var SURFACE_LABELS={standard:{name:"Standard",icon:"&#128994;",desc:"Grass / Dirt Infield"},allDirt:{name:"All Dirt",icon:"&#128997;",desc:"Full Dirt Infield"},infieldTurf:{name:"Infield Turf",icon:"&#128995;",desc:"Turf Infield / Grass OF"},fullTurf:{name:"Full Turf",icon:"&#128274;",desc:"100% Artificial Turf"}};
var TIME_OPTIONS=[];
for(var _h=6;_h<=21;_h++){for(var _m=0;_m<60;_m+=15){var _ap=_h<12?"AM":"PM";var _lbl=(_h%12===0?12:_h%12)+":"+(_m<10?"0"+_m:_m)+" "+_ap;TIME_OPTIONS.push({label:_lbl,hour:_h});}}

var FAV_KEY="grc_favs_v3";
function loadFavs(){try{return new Set(JSON.parse(localStorage.getItem(FAV_KEY))||[]);}catch(e){return new Set();}}
function saveFavs(s){try{localStorage.setItem(FAV_KEY,JSON.stringify([...s]));}catch(e){}}
var favorites=loadFavs();

var selectedFieldId=null,activeState="OK",activeRegion="all",activeType="all",selectedSurface="standard";

function buildRegionChips(){
  var wrap=document.getElementById("region-chips");wrap.innerHTML="";
  var regions=REGIONS[activeState]||REGIONS.OK;
  regions.forEach(function(r){
    var btn=document.createElement("button");btn.type="button";
    btn.className="fchip"+(r.id===activeRegion?" active":"");btn.dataset.region=r.id;btn.textContent=r.label;
    btn.addEventListener("click",function(){
      activeRegion=r.id;
      document.querySelectorAll(".fchip[data-region]").forEach(function(b){b.classList.toggle("active",b.dataset.region===r.id);});
      renderGrids();
    });
    wrap.appendChild(btn);
  });
}

function buildTypeChips(){
  var wrap=document.getElementById("type-chips");wrap.innerHTML="";
  TYPES.forEach(function(t){
    var btn=document.createElement("button");btn.type="button";
    btn.className="fchip "+(t.cls||"")+(t.id===activeType?" active":"");btn.dataset.typeId=t.id;btn.textContent=t.label;
    btn.addEventListener("click",function(){
      activeType=t.id;
      document.querySelectorAll(".fchip[data-type-id]").forEach(function(b){b.classList.toggle("active",b.dataset.typeId===t.id);});
      renderGrids();
    });
    wrap.appendChild(btn);
  });
}

function makeBtn(f){
  var isFav=favorites.has(f.id);
  var btn=document.createElement("button");btn.type="button";
  btn.className="field-btn"+(isFav?" favorited":"");btn.dataset.id=String(f._idx);
  var nd=document.createElement("div");nd.className="fn";nd.textContent=f.name;
  var cd=document.createElement("div");cd.className="fc";cd.textContent=f.city;
  var td=document.createElement("div");td.className="ft "+(TYPE_CLS[f.type]||"");td.textContent=TYPE_LABELS[f.type]||"";
  var star=document.createElement("button");star.type="button";star.className="star-btn";
  star.title=isFav?"Remove from favorites":"Pin to favorites";star.textContent=isFav?"\u2605":"\u2606";
  star.addEventListener("click",function(e){e.stopPropagation();toggleFav(f.id);});
  btn.appendChild(nd);btn.appendChild(cd);btn.appendChild(td);btn.appendChild(star);
  btn.addEventListener("click",function(){selectField(f._idx);});
  return btn;
}

function renderGrids(){
  var favGrid=document.getElementById("fav-grid"),allGrid=document.getElementById("field-grid");
  var favSect=document.getElementById("fav-section"),noRes=document.getElementById("no-results");
  var counter=document.getElementById("park-count");
  favGrid.innerHTML="";allGrid.innerHTML="";
  var favFields=FIELDS.filter(function(f){return favorites.has(f.id);});
  if(favFields.length>0){favSect.classList.remove("hidden");favFields.forEach(function(f){favGrid.appendChild(makeBtn(f));});}
  else{favSect.classList.add("hidden");}
  var filtered=FIELDS.filter(function(f){
    if(f.state!==activeState)return false;
    if(activeRegion!=="all"&&f.region!==activeRegion)return false;
    if(activeType!=="all"&&f.type!==activeType)return false;
    return true;
  }).sort(function(a,b){return a.city.localeCompare(b.city)||a.name.localeCompare(b.name);});
  counter.textContent=filtered.length+" parks";
  if(filtered.length===0){noRes.style.display="block";}
  else{noRes.style.display="none";filtered.forEach(function(f){allGrid.appendChild(makeBtn(f));});}
  syncSelected();
}

function syncSelected(){document.querySelectorAll(".field-btn").forEach(function(b){b.classList.toggle("selected",Number(b.dataset.id)===selectedFieldId);});}
function toggleFav(id){if(favorites.has(id)){favorites.delete(id);}else{favorites.add(id);}saveFavs(favorites);renderGrids();}
function selectField(idx){selectedFieldId=idx;syncSelected();checkReady();}
function checkReady(){var ok=document.getElementById("date-input").value&&selectedFieldId!==null;document.getElementById("submit-btn").disabled=!ok;}

(function init(){
  var today=new Date().toISOString().split("T")[0];
  var di=document.getElementById("date-input");di.value=today;di.addEventListener("change",checkReady);
  var ts=document.getElementById("time-sel");
  TIME_OPTIONS.forEach(function(t,i){var o=document.createElement("option");o.value=String(i);o.textContent=t.label;ts.appendChild(o);});
  ts.value="16";ts.addEventListener("change",checkReady);
  document.querySelectorAll(".surf-btn").forEach(function(btn){
    btn.addEventListener("click",function(){selectedSurface=btn.dataset.surface;document.querySelectorAll(".surf-btn").forEach(function(b){b.classList.remove("active");});btn.classList.add("active");});
  });
  document.getElementById("state-sel").addEventListener("change",function(){
    activeState=this.value;activeRegion="all";activeType="all";
    buildRegionChips();buildTypeChips();renderGrids();
  });
  buildRegionChips();buildTypeChips();loadParks();
  document.getElementById("submit-btn").addEventListener("click",doCheck);
})();

async function fetchWeather(lat,lon,date,hour){
  var url="https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&hourly=precipitation_probability,precipitation,windspeed_10m,weathercode,apparent_temperature&timezone=auto&forecast_days=7";
  var res=await fetch(url);if(!res.ok)throw new Error("Weather service unavailable. Please try again.");
  var data=await res.json();
  var hours=data.hourly.time,rPct=data.hourly.precipitation_probability,precip=data.hourly.precipitation,wind=data.hourly.windspeed_10m,codes=data.hourly.weathercode,appTemp=data.hourly.apparent_temperature;
  var target=date+"T"+String(hour).padStart(2,"0")+":00";
  var idx=hours.indexOf(target);if(idx===-1)throw new Error("Date is outside the 7-day forecast window.");
  var winIdxs=[-1,0,1,2].map(function(o){return Math.max(0,Math.min(idx+o,hours.length-1));});
  var avg=function(arr){return Math.round(winIdxs.reduce(function(s,i){return s+arr[i];},0)/winIdxs.length);};
  var maxArr=function(arr){return Math.max.apply(null,winIdxs.map(function(i){return arr[i];}));};
  var preTotal=0;for(var p=Math.max(0,idx-6);p<idx;p++){preTotal+=precip[p];}
  return{rainPct:avg(rPct),precipMm:parseFloat(maxArr(precip).toFixed(2)),windKph:avg(wind),weatherCode:codes[idx],preGameMm:parseFloat(preTotal.toFixed(2)),windChillF:Math.round(avg(appTemp)*9/5+32)};
}

function getProb(rainPct,precipMm,windKph,surface,preGameMm,windChillF){
  var cfg=SURFACE_CFG[surface]||SURFACE_CFG.standard,s=100;
  s-=rainPct*0.72*cfg.duringMult;
  s-=Math.min(precipMm*16,26)*cfg.duringMult;
  s-=Math.min(preGameMm*10+Math.sqrt(preGameMm)*4,32)*cfg.preMult;
  s-=Math.max(0,(windKph-32)*0.5)*cfg.windMult;
  if(windChillF<40){s-=Math.min((40-windChillF)*2.5,40);}
  return Math.max(0,Math.min(100,Math.round(s)));
}

function wxEmoji(c){if(c===0)return"\u2600\uFE0F";if(c<=3)return"\u26C5";if(c<=48)return"\uD83C\uDF2B";if(c<=67)return"\uD83C\uDF27";if(c<=77)return"\u2744\uFE0F";if(c<=82)return"\uD83C\uDF26";return"\u26C8";}

async function doCheck(){
  var btn=document.getElementById("submit-btn"),errBox=document.getElementById("error-box"),resCard=document.getElementById("result-card");
  errBox.style.display="none";resCard.style.display="none";btn.disabled=true;
  btn.innerHTML='<div class="spinner"></div> FETCHING WEATHER...';
  var dateVal=document.getElementById("date-input").value,timeIdx=Number(document.getElementById("time-sel").value),timeOpt=TIME_OPTIONS[timeIdx];
  var field=FIELDS[selectedFieldId];
  try{
    var wx=await fetchWeather(field.lat,field.lon,dateVal,timeOpt.hour);
    var prob=getProb(wx.rainPct,wx.precipMm,wx.windKph,selectedSurface,wx.preGameMm,wx.windChillF);
    renderResult(field,dateVal,timeOpt.label,wx,prob,selectedSurface);
  }catch(e){errBox.textContent="\u26A0 "+e.message;errBox.style.display="block";}
  finally{btn.disabled=false;btn.innerHTML="CHECK PLAY PROBABILITY";}
}

function renderResult(field,dateVal,timeLabel,wx,prob,surface){
  var key=prob>=75?"on":prob>=45?"questionable":"cancelled";
  var st=STATUSES[key],sl=SURFACE_LABELS[surface]||SURFACE_LABELS.standard,cfg=SURFACE_CFG[surface]||SURFACE_CFG.standard;
  var card=document.getElementById("result-card");
  card.style.background="#ffffff";card.style.border="1px solid "+st.color+"33";card.style.boxShadow="0 0 50px "+st.glow;
  document.getElementById("result-header").style.background="linear-gradient(90deg,"+st.glow+",transparent)";
  document.getElementById("rh-field").textContent=field.name+" \xb7 "+field.city;
  var dateObj=new Date(dateVal+"T12:00:00");
  document.getElementById("rh-date").textContent=dateObj.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})+" at "+timeLabel+"  \xb7  "+sl.name;
  document.getElementById("wx-icon").textContent=wxEmoji(wx.weatherCode);
  var circ=2*Math.PI*52,arc=document.getElementById("gauge-arc");
  arc.setAttribute("stroke",st.color);arc.setAttribute("stroke-dasharray","0 999");
  void arc.getBoundingClientRect();
  setTimeout(function(){arc.setAttribute("stroke-dasharray",(prob/100*circ)+" "+circ);},30);
  document.getElementById("gauge-pct").textContent=prob+"%";
  document.getElementById("gauge-pct").setAttribute("fill",st.color);
  document.getElementById("verdict-label").innerHTML=st.label;
  document.getElementById("verdict-label").style.color=st.color;
  document.getElementById("verdict-sub").textContent=st.sub;
  function mmToIn(mm){return(mm*0.0393701).toFixed(2)+'"';}
  function kphToMph(k){return Math.round(k*0.621371);}
  function setPill(pid,vid,val,warn){document.getElementById(pid).classList.toggle("warn",warn);document.getElementById(vid).textContent=val;}
  var isCold=wx.windChillF<40;
  var tempPill=document.getElementById("pill-temp");
  tempPill.classList.toggle("cold",isCold);
  tempPill.classList.remove("warn");
  document.getElementById("temp-icon").textContent=isCold?"🥶":"🌡️";
  document.getElementById("pv-temp").textContent=wx.windChillF+"\xb0F";
  setPill("pill-rain","pv-rain",wx.rainPct+"%",wx.rainPct>60);
  setPill("pill-precip","pv-precip",mmToIn(wx.precipMm),wx.precipMm>2);
  setPill("pill-wind","pv-wind",kphToMph(wx.windKph)+" mph",wx.windKph>40);
  document.getElementById("result-coords").textContent="Surface: "+sl.name+" ("+sl.desc+")\nWeather: Open-Meteo \xb7 "+field.lat.toFixed(4)+", "+field.lon.toFixed(4)+" \xb7 Always confirm with your league director.";
  card.style.display="block";card.className="";void card.getBoundingClientRect();card.className="result-enter";
  card.scrollIntoView({behavior:"smooth",block:"nearest"});
}
</script>
